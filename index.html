<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Predimensionamiento estructural</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="sidebar" aria-label="Herramientas">
          <div class="brand">
            <span class="brand-mark">P</span>
            <div>
              <h1>Predimensionamiento</h1>
              <p>Hormigon armado</p>
            </div>
          </div>

          <nav class="tool-tabs" aria-label="Tipo de elemento">
            <button class="tab-button active" type="button" data-tool="losa">Losa</button>
            <button class="tab-button" type="button" data-tool="viga">Viga</button>
            <button class="tab-button" type="button" data-tool="columna">Columna</button>
            <button class="tab-button" type="button" data-tool="zapata">Zapata</button>
          </nav>

          <div class="project-card">
            <label for="projectName">Proyecto</label>
            <input id="projectName" type="text" value="Predimensionamiento preliminar">
          </div>
        </aside>

        <section class="panel">
          <header class="panel-header">
            <div>
              <p class="eyebrow">Aplicacion tecnica</p>
              <h2 id="toolTitle">Losa maciza</h2>
            </div>
            <button class="ghost-button" id="resetButton" type="button">Reiniciar</button>
          </header>

          <form class="calculator" id="calculatorForm">
            <div class="inputs-grid" id="inputsGrid"></div>
          </form>
        </section>

        <section class="results-panel" aria-live="polite">
          <div class="results-header">
            <div>
              <p class="eyebrow">Resultado</p>
              <h2 id="resultTitle">Espesor recomendado</h2>
            </div>
            <span class="status-pill" id="statusPill">Preliminar</span>
          </div>

          <div class="primary-result">
            <span id="primaryValue">--</span>
            <small id="primaryUnit">cm</small>
          </div>

          <div class="result-list" id="resultList"></div>

          <div class="notes">
            <h3>Criterio</h3>
            <p id="criteriaText"></p>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
